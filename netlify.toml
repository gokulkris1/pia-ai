[build]
  publish = "frontend"
  command = ""

# /static/* on FastAPI becomes /* on Netlify (files live at root of frontend/)
[[redirects]]
  from = "/static/:file"
  to = "/:file"
  status = 200
  force = false

# API calls proxied to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://pia-ai-gpzy.onrender.com/api/:splat"
  status = 200
  force = true

# Onboard page served from Netlify directly (frontend/onboard.html)
[[redirects]]
  from = "/onboard"
  to = "/onboard.html"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(self)"
