[build]
  publish = "frontend"
  command = ""

[build.environment]
  PYTHON_VERSION = "3.11.8"
  PIP_NO_BINARY = ""
  SKIP_INSTALL = "true"

# API calls are proxied to the FastAPI backend on Render.
# Set BACKEND_URL in Netlify → Site settings → Environment variables.
# Value should be your Render service URL, e.g. https://pia-backend.onrender.com
[[redirects]]
  from = "/api/*"
  to = "https://pia-ai-gpzy.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/onboard"
  to = "https://pia-ai-gpzy.onrender.com/onboard"
  status = 200
  force = true

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(self)"
