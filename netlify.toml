[build]
  publish = "frontend"
  command = ""

# API calls are proxied to the FastAPI backend on Render.
# Set BACKEND_URL in Netlify → Site settings → Environment variables.
# Value should be your Render service URL, e.g. https://pia-backend.onrender.com
[[redirects]]
  from = "/api/*"
  to = ":BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/onboard"
  to = ":BACKEND_URL/onboard"
  status = 200
  force = true

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(self)"
