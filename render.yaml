services:
  - type: web
    name: pia-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Add these in the Render dashboard → Environment tab:
      # calude_key        = sk-ant-...
      # OpenAI_Key        = sk-...
      # ELEVENLABS_API_KEY = ...
      # ELEVENLABS_VOICE_ID = (your cloned voice ID)
      # LLM_ENGINE        = claude
